<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Bose</title>

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="./src/styles/main.scss"
    />
  </head>

  <body>
    <header class="header">
      <div class="header__top">
        <a href="#">
          <img
            src="/src/image/logo-1.png"
            alt="Bose logo"
          />
        </a>

        <div class="header__icons">
          <div class="icon icon--phone"></div>
          <div class="icon icon--menu"></div>
        </div>
      </div>

      <div class="header__bottom"></div>

      <h1 class="header__title">
        Bring joy back<br />
        to the everyday.
      </h1>
    </header>

    <aside class="menu"></aside>

    <main class="main">
      <section class="products">
        <h2>Recommended</h2>
      </section>

      <section class="store">
        <h2>Browse Nothing products by category</h2>
      </section>

      <section class="login">
        <h2>About us</h2>
      </section>

      <section class="cart">
        <h2>Contact us</h2>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
